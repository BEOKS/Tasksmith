<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasksmith Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <style>
      :root {
        --paper: #f2eadf;
        --paper-warm: #eadbc8;
        --paper-cool: #edf0ec;
        --ink: #1e2328;
        --line: rgba(30, 35, 40, 0.12);
        --line-strong: rgba(30, 35, 40, 0.2);
        --amber: #c68b3b;
        --sage: #83906c;
        --oxide: #256a61;
        --brick: #aa6254;
        --mint: #dcecdf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(198, 139, 59, 0.18), transparent 28%),
          radial-gradient(circle at 82% 84%, rgba(37, 106, 97, 0.14), transparent 30%),
          linear-gradient(145deg, #efe4d4 0%, #f7f0e8 40%, #eee7dc 100%);
        color: var(--ink);
        font-family: "Optima", "Avenir Next", "Helvetica Neue", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 28px 28px;
        mix-blend-mode: screen;
        opacity: 0.3;
      }

      body::after {
        background-image:
          radial-gradient(rgba(30, 35, 40, 0.08) 0.7px, transparent 0.7px);
        background-size: 8px 8px;
        opacity: 0.08;
      }

      .frame {
        position: relative;
        width: 1200px;
        height: 675px;
        margin: 0 auto;
        overflow: hidden;
      }

      .halo {
        position: absolute;
        border-radius: 999px;
        filter: blur(44px);
        opacity: 0.45;
      }

      .halo.left {
        left: 34px;
        top: 42px;
        width: 330px;
        height: 230px;
        background: rgba(198, 139, 59, 0.16);
      }

      .halo.right {
        right: 62px;
        bottom: 34px;
        width: 360px;
        height: 240px;
        background: rgba(37, 106, 97, 0.16);
      }

      .brand {
        position: absolute;
        left: 66px;
        top: 48px;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        font-size: 58px;
        letter-spacing: -0.06em;
        line-height: 0.95;
        font-weight: 700;
      }

      .meta {
        position: absolute;
        right: 72px;
        top: 60px;
        display: flex;
        gap: 14px;
      }

      .meta-pill {
        width: 58px;
        height: 58px;
        border-radius: 19px;
        background: rgba(255, 252, 246, 0.58);
        border: 1px solid rgba(30, 35, 40, 0.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 14px 30px rgba(115, 91, 59, 0.08);
        position: relative;
      }

      .meta-pill::before,
      .meta-pill::after {
        content: "";
        position: absolute;
      }

      .meta-pill.in::before {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        left: 20px;
        top: 20px;
        background: rgba(30, 35, 40, 0.86);
      }

      .meta-pill.split::before {
        left: 16px;
        top: 19px;
        width: 26px;
        height: 20px;
        border-left: 2px solid rgba(30, 35, 40, 0.7);
        border-top: 2px solid rgba(30, 35, 40, 0.7);
        border-bottom: 2px solid rgba(30, 35, 40, 0.7);
        border-radius: 18px 0 0 18px;
      }

      .meta-pill.split::after {
        right: 12px;
        top: 17px;
        width: 8px;
        height: 24px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(30, 35, 40, 0.72) 0 4px, transparent 4px 10px, rgba(30, 35, 40, 0.72) 10px 14px, transparent 14px 20px, rgba(30, 35, 40, 0.72) 20px 24px);
      }

      .meta-pill.loop::before {
        inset: 14px;
        border-radius: 50%;
        border: 2px solid rgba(37, 106, 97, 0.54);
      }

      .meta-pill.loop::after {
        left: 32px;
        top: 12px;
        width: 10px;
        height: 10px;
        border-top: 2px solid rgba(37, 106, 97, 0.7);
        border-right: 2px solid rgba(37, 106, 97, 0.7);
        transform: rotate(35deg);
      }

      .meta-pill.out::before,
      .meta-pill.out::after {
        left: 18px;
        right: 18px;
        height: 10px;
        border-radius: 999px;
        background: rgba(37, 106, 97, 0.72);
      }

      .meta-pill.out::before {
        top: 18px;
        box-shadow: 0 14px 0 rgba(37, 106, 97, 0.45);
      }

      .meta-pill.out::after {
        top: 32px;
      }

      .board {
        position: absolute;
        inset: 152px 50px 28px;
        border-radius: 40px;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.54), transparent 36%),
          linear-gradient(180deg, rgba(255, 252, 247, 0.82), rgba(250, 246, 240, 0.7));
        border: 1px solid rgba(30, 35, 40, 0.08);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          0 26px 60px rgba(115, 91, 59, 0.09);
      }

      .board::before {
        content: "";
        position: absolute;
        inset: 16px;
        border-radius: 28px;
        border: 1px dashed rgba(30, 35, 40, 0.06);
      }

      .dock,
      .processor-shell {
        position: absolute;
        border-radius: 30px;
        border: 1px solid rgba(30, 35, 40, 0.09);
        background: rgba(255, 252, 247, 0.44);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .dock::before,
      .processor-shell::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 22px;
        border: 1px solid rgba(30, 35, 40, 0.06);
      }

      .dock.input {
        left: 58px;
        top: 148px;
        width: 146px;
        height: 128px;
      }

      .hub {
        position: absolute;
        left: 302px;
        top: 162px;
        width: 124px;
        height: 102px;
      }

      .hub-stem,
      .hub-arm {
        position: absolute;
        background: rgba(30, 35, 40, 0.26);
        border-radius: 999px;
      }

      .hub-stem {
        left: 42px;
        top: 18px;
        width: 10px;
        height: 66px;
      }

      .hub-arm.a {
        left: 48px;
        top: 28px;
        width: 64px;
        height: 8px;
        transform: rotate(-32deg);
        transform-origin: left center;
      }

      .hub-arm.b {
        left: 48px;
        top: 48px;
        width: 68px;
        height: 8px;
      }

      .hub-arm.c {
        left: 48px;
        top: 66px;
        width: 64px;
        height: 8px;
        transform: rotate(32deg);
        transform-origin: left center;
      }

      .hub-node {
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgba(30, 35, 40, 0.86);
      }

      .hub-node.base {
        left: 39px;
        top: 10px;
      }

      .hub-node.top {
        right: 8px;
        top: 10px;
      }

      .hub-node.mid {
        right: 0;
        top: 44px;
      }

      .hub-node.bot {
        right: 8px;
        bottom: 12px;
      }

      .processor-shell {
        left: 500px;
        top: 94px;
        width: 360px;
        height: 236px;
      }

      .loop-plate {
        position: absolute;
        inset: 38px 86px 38px 82px;
        border-radius: 50%;
        border: 1.5px dashed rgba(37, 106, 97, 0.34);
      }

      .loop-plate::before,
      .loop-plate::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(37, 106, 97, 0.62);
      }

      .loop-plate::before {
        left: 62px;
        top: 0;
      }

      .loop-plate::after {
        right: 32px;
        top: 54px;
      }

      .gate {
        position: absolute;
        top: 54px;
        bottom: 54px;
        width: 64px;
        border-radius: 24px;
        border: 1px solid rgba(30, 35, 40, 0.08);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }

      .gate.left {
        left: 40px;
        background: linear-gradient(180deg, rgba(198, 139, 59, 0.2), rgba(255, 255, 255, 0.2));
      }

      .gate.right {
        right: 40px;
        background: linear-gradient(180deg, rgba(37, 106, 97, 0.18), rgba(255, 255, 255, 0.18));
      }

      .dock.output {
        right: 62px;
        top: 148px;
        width: 138px;
        height: 128px;
      }

      .stack-mark {
        position: absolute;
        left: 30px;
        right: 30px;
        height: 12px;
        border-radius: 999px;
        background: rgba(37, 106, 97, 0.2);
      }

      .stack-mark.a {
        top: 34px;
      }

      .stack-mark.b {
        top: 56px;
        right: 44px;
        background: rgba(37, 106, 97, 0.32);
      }

      .stack-mark.c {
        top: 78px;
        left: 44px;
        background: rgba(37, 106, 97, 0.46);
      }

      .status-strip {
        position: absolute;
        left: 72px;
        right: 72px;
        bottom: 34px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status-pill {
        width: 148px;
        height: 18px;
        border-radius: 999px;
        background: rgba(30, 35, 40, 0.08);
        overflow: hidden;
      }

      .status-pill::before {
        content: "";
        display: block;
        height: 100%;
        width: 52%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(198, 139, 59, 0.3), rgba(37, 106, 97, 0.18));
      }

      .status-dots {
        display: flex;
        gap: 12px;
      }

      .status-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(30, 35, 40, 0.18);
      }

      .status-dots span:last-child {
        background: rgba(37, 106, 97, 0.5);
      }

      svg.wires {
        position: absolute;
        inset: 0;
        overflow: visible;
      }

      .wire {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .wire.main {
        stroke: rgba(30, 35, 40, 0.12);
        stroke-width: 10;
      }

      .wire.loop {
        stroke: rgba(37, 106, 97, 0.14);
        stroke-width: 8;
      }

      .wire.return {
        stroke: rgba(30, 35, 40, 0.12);
        stroke-width: 7;
        stroke-dasharray: 4 14;
      }

      .token {
        position: absolute;
        left: 0;
        top: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(30, 35, 40, 0.08);
        box-shadow:
          0 16px 24px rgba(108, 84, 54, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.66);
        transform: translate3d(0, 0, 0);
      }

      .request-token {
        width: 78px;
        height: 36px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(253, 241, 221, 0.98), rgba(255, 255, 255, 0.96));
      }

      .request-token::before,
      .request-token::after {
        content: "";
        position: absolute;
      }

      .request-token::before {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(30, 35, 40, 0.82);
      }

      .request-token::after {
        width: 30px;
        height: 2px;
        right: 14px;
        background: rgba(30, 35, 40, 0.18);
        border-radius: 999px;
      }

      .task-token {
        width: 68px;
        height: 30px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(255, 247, 233, 0.98), rgba(255, 255, 255, 0.94));
      }

      .task-token::before {
        content: "";
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        left: 12px;
        background: currentColor;
        opacity: 0.72;
      }

      .task-token[data-tone="1"] {
        color: var(--amber);
      }

      .task-token[data-tone="2"] {
        color: var(--sage);
        background: linear-gradient(135deg, rgba(238, 244, 224, 0.98), rgba(255, 255, 255, 0.94));
      }

      .task-token[data-tone="3"] {
        color: var(--brick);
        background: linear-gradient(135deg, rgba(248, 231, 228, 0.98), rgba(255, 255, 255, 0.94));
      }

      .task-token.is-complete {
        color: var(--oxide);
        background: linear-gradient(135deg, rgba(220, 236, 223, 0.98), rgba(255, 255, 255, 0.94));
      }

      .task-notch {
        position: absolute;
        right: 12px;
        width: 16px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.24;
      }

      .task-notch.a {
        top: 11px;
      }

      .task-notch.b {
        top: 17px;
        width: 10px;
      }

      .check {
        position: absolute;
        top: -7px;
        right: -7px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--oxide);
        color: #fff;
        font-size: 11px;
        line-height: 18px;
        text-align: center;
        box-shadow: 0 8px 18px rgba(37, 106, 97, 0.18);
      }

      .result-token {
        width: 90px;
        height: 42px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(221, 238, 224, 0.98), rgba(255, 255, 255, 0.96));
        color: var(--oxide);
      }

      .result-token::before,
      .result-token::after {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        height: 5px;
        border-radius: 999px;
        background: currentColor;
      }

      .result-token::before {
        top: 13px;
        opacity: 0.5;
      }

      .result-token::after {
        top: 23px;
        opacity: 0.9;
      }

      .pulse {
        position: absolute;
        width: 94px;
        height: 50px;
        border-radius: 999px;
        border: 1.6px solid rgba(198, 139, 59, 0.4);
        background: rgba(253, 246, 236, 0.3);
      }

      .merge-flash {
        position: absolute;
        right: 54px;
        top: 132px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(37, 106, 97, 0.16), transparent 66%);
      }

      .lane-glow {
        position: absolute;
        width: 80px;
        height: 118px;
        border-radius: 26px;
        border: 1px solid rgba(30, 35, 40, 0.06);
        opacity: 0.08;
      }

      .lane-glow.worker {
        background: linear-gradient(180deg, rgba(198, 139, 59, 0.16), rgba(255, 255, 255, 0.08));
      }

      .lane-glow.evaluator {
        background: linear-gradient(180deg, rgba(37, 106, 97, 0.14), rgba(255, 255, 255, 0.08));
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="halo left"></div>
      <div class="halo right"></div>

      <div class="brand">Tasksmith</div>

      <div class="meta" aria-hidden="true">
        <div class="meta-pill in"></div>
        <div class="meta-pill split"></div>
        <div class="meta-pill loop"></div>
        <div class="meta-pill out"></div>
      </div>

      <div class="board">
        <div class="dock input"></div>

        <div class="hub" aria-hidden="true">
          <div class="hub-stem"></div>
          <div class="hub-arm a"></div>
          <div class="hub-arm b"></div>
          <div class="hub-arm c"></div>
          <div class="hub-node base"></div>
          <div class="hub-node top"></div>
          <div class="hub-node mid"></div>
          <div class="hub-node bot"></div>
        </div>

        <div class="processor-shell">
          <div class="gate left"></div>
          <div class="gate right"></div>
          <div class="loop-plate" id="loopRing"></div>
        </div>

        <div class="dock output">
          <div class="stack-mark a"></div>
          <div class="stack-mark b"></div>
          <div class="stack-mark c"></div>
        </div>

        <svg class="wires" viewBox="0 0 1100 470" aria-hidden="true">
          <path class="wire main" d="M 198 212 C 240 212 254 212 300 212" />
          <path class="wire main" d="M 426 212 C 454 212 478 176 500 148" />
          <path class="wire main" d="M 426 212 C 454 212 478 212 500 212" />
          <path class="wire main" d="M 426 212 C 454 212 478 248 500 276" />
          <path class="wire loop" d="M 684 148 C 730 148 772 168 844 204" />
          <path class="wire loop" d="M 684 212 C 730 212 772 212 844 212" />
          <path class="wire loop" d="M 684 276 C 730 276 772 256 844 220" />
          <path class="wire return" d="M 918 268 C 946 352 742 394 490 394 C 230 394 82 350 122 248" />
        </svg>

        <div class="pulse" id="requestPulse"></div>
        <div class="merge-flash" id="mergeFlash"></div>

        <div class="lane-glow worker" id="workerGlow1"></div>
        <div class="lane-glow worker" id="workerGlow2"></div>
        <div class="lane-glow worker" id="workerGlow3"></div>
        <div class="lane-glow evaluator" id="evaluatorGlow1"></div>
        <div class="lane-glow evaluator" id="evaluatorGlow2"></div>
        <div class="lane-glow evaluator" id="evaluatorGlow3"></div>

        <div class="token request-token" id="requestToken"></div>

        <div class="token task-token" id="task1" data-tone="1">
          <span class="task-notch a"></span>
          <span class="task-notch b"></span>
          <span class="check" id="check1">✓</span>
        </div>

        <div class="token task-token" id="task2" data-tone="2">
          <span class="task-notch a"></span>
          <span class="task-notch b"></span>
          <span class="check" id="check2">✓</span>
        </div>

        <div class="token task-token" id="task3" data-tone="3">
          <span class="task-notch a"></span>
          <span class="task-notch b"></span>
          <span class="check" id="check3">✓</span>
        </div>

        <div class="token result-token" id="resultToken"></div>

        <div class="status-strip" aria-hidden="true">
          <div class="status-pill"></div>
          <div class="status-dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const requestToken = document.getElementById("requestToken");
      const requestPulse = document.getElementById("requestPulse");
      const resultToken = document.getElementById("resultToken");
      const mergeFlash = document.getElementById("mergeFlash");
      const loopRing = document.getElementById("loopRing");
      const taskTokens = [
        document.getElementById("task1"),
        document.getElementById("task2"),
        document.getElementById("task3")
      ];
      const checks = [
        document.getElementById("check1"),
        document.getElementById("check2"),
        document.getElementById("check3")
      ];
      const workerGlows = [
        document.getElementById("workerGlow1"),
        document.getElementById("workerGlow2"),
        document.getElementById("workerGlow3")
      ];
      const evaluatorGlows = [
        document.getElementById("evaluatorGlow1"),
        document.getElementById("evaluatorGlow2"),
        document.getElementById("evaluatorGlow3")
      ];

      const pos = {
        requestStart: { x: 92, y: 194 },
        divider: { x: 330, y: 196 },
        split: [
          { x: 442, y: 138 },
          { x: 442, y: 196 },
          { x: 442, y: 254 }
        ],
        worker: [
          { x: 544, y: 138 },
          { x: 544, y: 196 },
          { x: 544, y: 254 }
        ],
        evaluator: [
          { x: 694, y: 138 },
          { x: 694, y: 196 },
          { x: 694, y: 254 }
        ],
        merge: [
          { x: 838, y: 170 },
          { x: 838, y: 196 },
          { x: 838, y: 222 }
        ],
        result: { x: 896, y: 190 },
        returnA: { x: 896, y: 336 },
        returnB: { x: 490, y: 390 },
        returnC: { x: 132, y: 338 },
        returnEnd: { x: 92, y: 194 }
      };

      function resetScene() {
        gsap.set(requestToken, { x: pos.requestStart.x, y: pos.requestStart.y, autoAlpha: 1, scale: 1 });
        gsap.set(requestPulse, { x: pos.requestStart.x - 8, y: pos.requestStart.y - 7, autoAlpha: 0.16, scale: 0.92 });
        gsap.set(resultToken, { x: pos.result.x, y: pos.result.y, autoAlpha: 0, scale: 0.9 });
        gsap.set(mergeFlash, { autoAlpha: 0, scale: 0.82 });
        gsap.set(loopRing, { autoAlpha: 0.38, rotate: 0, scale: 0.95, transformOrigin: "50% 50%" });

        workerGlows.forEach((glow, index) => {
          gsap.set(glow, { x: 530, y: 112 + index * 58, autoAlpha: 0.08, scale: 0.95 });
        });

        evaluatorGlows.forEach((glow, index) => {
          gsap.set(glow, { x: 680, y: 112 + index * 58, autoAlpha: 0.08, scale: 0.95 });
        });

        taskTokens.forEach((task) => task.classList.remove("is-complete"));

        taskTokens.forEach((task, index) => {
          gsap.set(task, {
            x: pos.divider.x,
            y: pos.divider.y,
            autoAlpha: 0,
            scale: 0.4 + index * 0.02
          });
        });

        checks.forEach((check) => {
          gsap.set(check, { autoAlpha: 0, scale: 0 });
        });
      }

      function pulseLane(timeline, target, at) {
        timeline
          .to(target, { autoAlpha: 0.5, scale: 1.04, duration: 0.12, ease: "power2.out" }, at)
          .to(target, { autoAlpha: 0.08, scale: 0.95, duration: 0.28, ease: "power2.inOut" }, at + 0.12);
      }

      function buildTimeline() {
        const tl = gsap.timeline({
          paused: true,
          repeat: -1,
          defaults: { ease: "power2.out" }
        });

        tl.to(requestPulse, {
          autoAlpha: 0.38,
          scale: 1.08,
          duration: 0.22,
          ease: "power1.out"
        });

        tl.to(
          requestToken,
          {
            scale: 1.04,
            duration: 0.16,
            yoyo: true,
            repeat: 1,
            ease: "power1.inOut"
          },
          0
        );

        tl.to(
          requestToken,
          {
            x: pos.divider.x,
            y: pos.divider.y,
            duration: 0.72,
            ease: "power2.inOut"
          },
          0.24
        );

        tl.to(
          requestPulse,
          {
            x: pos.divider.x - 8,
            y: pos.divider.y - 7,
            duration: 0.72,
            ease: "power2.inOut"
          },
          0.24
        );

        tl.to(
          requestToken,
          {
            autoAlpha: 0,
            scale: 0.64,
            duration: 0.18
          },
          0.96
        );

        tl.to(
          requestPulse,
          {
            autoAlpha: 0,
            scale: 1.12,
            duration: 0.22
          },
          0.96
        );

        taskTokens.forEach((task, index) => {
          const appearAt = 1.0 + index * 0.1;
          const workerAt = 1.34 + index * 0.18;
          const evaluatorAt = workerAt + 0.3;
          const completeAt = evaluatorAt + 0.3;
          const mergeAt = completeAt + 0.3;

          tl.to(
            task,
            {
              autoAlpha: 1,
              scale: 1,
              x: pos.split[index].x,
              y: pos.split[index].y,
              duration: 0.44,
              ease: "back.out(1.8)"
            },
            appearAt
          );

          tl.to(
            task,
            {
              x: pos.worker[index].x,
              y: pos.worker[index].y,
              duration: 0.3
            },
            workerAt
          );
          pulseLane(tl, workerGlows[index], workerAt);

          tl.to(
            task,
            {
              x: pos.evaluator[index].x,
              y: pos.evaluator[index].y,
              duration: 0.3
            },
            evaluatorAt
          );
          pulseLane(tl, evaluatorGlows[index], evaluatorAt);

          tl.to(
            checks[index],
            {
              autoAlpha: 1,
              scale: 1,
              duration: 0.14,
              ease: "back.out(2)"
            },
            completeAt
          );
          tl.call(() => task.classList.add("is-complete"), [], completeAt);

          tl.to(
            task,
            {
              x: pos.merge[index].x,
              y: pos.merge[index].y,
              duration: 0.38,
              ease: "power2.inOut"
            },
            mergeAt
          );
        });

        tl.to(
          loopRing,
          {
            rotate: 360,
            scale: 1,
            duration: 1.74,
            ease: "none"
          },
          1.24
        );

        tl.to(
          mergeFlash,
          {
            autoAlpha: 1,
            scale: 1.04,
            duration: 0.28
          },
          2.62
        );

        tl.to(
          taskTokens,
          {
            autoAlpha: 0,
            scale: 0.84,
            duration: 0.24,
            stagger: 0.03,
            ease: "power1.in"
          },
          2.74
        );

        tl.to(
          resultToken,
          {
            autoAlpha: 1,
            x: pos.result.x,
            y: pos.result.y,
            scale: 1,
            duration: 0.32,
            ease: "back.out(1.5)"
          },
          2.78
        );

        tl.to(
          mergeFlash,
          {
            autoAlpha: 0,
            scale: 1.08,
            duration: 0.34
          },
          2.96
        );

        tl.to(
          resultToken,
          {
            scale: 1.04,
            duration: 0.16,
            yoyo: true,
            repeat: 1,
            ease: "power1.inOut"
          },
          3.1
        );

        tl.to(
          resultToken,
          {
            keyframes: [
              { x: pos.returnA.x, y: pos.returnA.y, scale: 0.92, duration: 0.26, ease: "power1.inOut" },
              { x: pos.returnB.x, y: pos.returnB.y, scale: 0.88, duration: 0.48, ease: "power1.inOut" },
              { x: pos.returnC.x, y: pos.returnC.y, scale: 0.84, duration: 0.32, ease: "power1.inOut" },
              { x: pos.returnEnd.x, y: pos.returnEnd.y, scale: 1, duration: 0.28, ease: "power2.out" }
            ]
          },
          3.54
        );

        tl.to(
          requestPulse,
          {
            x: pos.requestStart.x - 8,
            y: pos.requestStart.y - 7,
            autoAlpha: 0.2,
            scale: 0.98,
            duration: 0.34
          },
          4.56
        );

        tl.to(
          requestToken,
          {
            autoAlpha: 1,
            x: pos.requestStart.x,
            y: pos.requestStart.y,
            scale: 1,
            duration: 0.18
          },
          4.66
        );

        tl.to(
          resultToken,
          {
            autoAlpha: 0,
            duration: 0.16
          },
          4.78
        );

        tl.to(
          requestPulse,
          {
            autoAlpha: 0.16,
            scale: 0.92,
            duration: 0.22
          },
          4.96
        );

        tl.to(
          loopRing,
          {
            autoAlpha: 0.38,
            rotate: 0,
            duration: 0.2,
            ease: "power1.out"
          },
          4.96
        );

        return tl;
      }

      if (typeof gsap === "undefined") {
        throw new Error("GSAP failed to load.");
      }

      resetScene();
      const timeline = buildTimeline();

      window.__TASKSMITH_READY = true;
      window.__TASKSMITH_LOOP_MS = 5400;
      window.startTasksmithAnimation = function startTasksmithAnimation() {
        resetScene();
        timeline.play(0);
      };
      window.stopTasksmithAnimation = function stopTasksmithAnimation() {
        timeline.pause(0);
        resetScene();
      };
    </script>
  </body>
</html>
